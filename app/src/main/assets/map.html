<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080d1a">
<title>বাংলাদেশ GK ম্যাপ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;
  font-family:'Hind Siliguri',sans-serif;background:#080d1a;color:#e8f4ff;
  -webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}

/* ── LOADER */
#loader{position:fixed;inset:0;background:#080d1a;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;z-index:9999;transition:opacity .5s}
.ld-em{font-size:52px;animation:ldp 1.4s ease-in-out infinite}
@keyframes ldp{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.ld-ring{width:50px;height:50px;border-radius:50%;
  border:3px solid rgba(0,229,255,.15);border-top-color:#00e5ff;
  animation:lds .85s linear infinite}
@keyframes lds{to{transform:rotate(360deg)}}
.ld-txt{color:#00e5ff;font-size:14px;opacity:.8}

/* ── MAP ── GPU-isolated, shake-free */
#map-holder{position:fixed;inset:0;overflow:hidden;touch-action:none;cursor:grab;
  background:#080d1a;
  /* KEY: own compositing layer — prevents sea-layer paint bleed */
  transform:translateZ(0);-webkit-transform:translateZ(0);
  backface-visibility:hidden;-webkit-backface-visibility:hidden}
#map-holder:active{cursor:grabbing}

#bangladesh-map{position:absolute;top:0;left:0;width:1545px;height:2133px;
  transform-origin:0 0;will-change:transform;
  /* KEY: separate GPU layer — sea fill-change never affects this */
  transform:translateZ(0);-webkit-transform:translateZ(0);
  backface-visibility:hidden;isolation:isolate}

/* SEA: static colour only — NO fill animation (was causing shake) */
#sea-layer path{fill:#0d9fd5}

/* River paths */
.river-path{fill:#1a8fd1!important;stroke:none!important;pointer-events:visibleFill;cursor:pointer;
  transition:fill .22s,filter .22s}
.river-path:hover{fill:#40c4ff!important;filter:drop-shadow(0 0 8px rgba(64,196,255,.8))!important}
.river-path.river-active{fill:#00e5ff!important;filter:drop-shadow(0 0 14px #00e5ff)!important}

/* Ripple — SVG SMIL, runs on compositor thread, no CPU jank */
.river-ripple{fill:none;stroke:#40c4ff;stroke-width:2.5;pointer-events:none}

/* Districts */
.division{stroke:#0a1b2e;stroke-width:1.2px;stroke-linejoin:round;cursor:pointer;
  transition:filter .22s;isolation:isolate}
.division:hover{filter:brightness(1.42) drop-shadow(0 0 5px rgba(255,255,255,.22))}
.division.highlighted{fill:#00897b!important;stroke:#00e5ff!important;stroke-width:2.5px!important;
  filter:drop-shadow(0 0 13px rgba(0,229,255,.65))!important}

/* Labels */
.district-label{font-family:'Hind Siliguri',sans-serif;font-size:13px;font-weight:600;
  fill:#ddeeff;paint-order:stroke;stroke:#070e1e;stroke-width:2.5px;
  pointer-events:none;vector-effect:non-scaling-stroke;opacity:0;transition:opacity .3s}
#labels-layer{pointer-events:none}

/* Border */
#main-border{vector-effect:non-scaling-stroke;stroke-width:3px;stroke:#00e5ff;
  filter:drop-shadow(0 0 4px rgba(0,229,255,.55));pointer-events:none;fill:none}

/* ── SEARCH */
#search-bar{position:fixed;top:0;left:0;right:0;padding:10px 12px 6px;
  background:linear-gradient(180deg,rgba(8,13,26,.97) 72%,transparent);z-index:500}
.search-row{display:flex;gap:8px;align-items:center}
#searchInput{flex:1;padding:10px 16px;background:rgba(255,255,255,.07);
  border:1px solid rgba(0,229,255,.22);border-radius:24px;color:#e8f4ff;
  font-size:15px;font-family:'Hind Siliguri',sans-serif;outline:none;transition:border-color .2s}
#searchInput::placeholder{color:rgba(255,255,255,.36)}
#searchInput:focus{border-color:#00e5ff;background:rgba(0,229,255,.05)}
#searchBtn{width:44px;height:44px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#006a4e,#00897b);color:#fff;font-size:21px;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 10px rgba(0,137,123,.4);transition:transform .12s}
#searchBtn:active{transform:scale(.92)}
#suggestions{margin-top:5px;background:rgba(9,16,36,.98);
  border:1px solid rgba(0,229,255,.12);border-radius:16px;overflow:hidden;
  max-height:230px;overflow-y:auto;display:none;box-shadow:0 10px 36px rgba(0,0,0,.7)}
.sugg-item{padding:11px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,.05);transition:background .15s}
.sugg-item:active,.sugg-item:hover{background:rgba(0,137,123,.28)}
.sugg-item:last-child{border-bottom:none}
.sugg-icon{font-size:17px;width:24px;text-align:center;flex-shrink:0}
.sugg-name{font-size:14px;font-weight:600;color:#e8f4ff}
.sugg-cat{font-size:11px;color:#00e5ff;opacity:.7}

/* ── ZOOM */
.zoom-controls{position:fixed;right:12px;bottom:76px;display:flex;flex-direction:column;
  gap:8px;z-index:400}
.zoom-btn{width:42px;height:42px;border-radius:50%;border:1px solid rgba(0,229,255,.18);
  background:rgba(0,100,70,.82);color:#fff;font-size:21px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);
  box-shadow:0 2px 10px rgba(0,0,0,.5);transition:background .15s,transform .1s}
.zoom-btn:active{background:rgba(0,137,123,.9);transform:scale(.91)}

/* ── INFO PANEL */
#info-panel{position:fixed;bottom:0;left:0;right:0;background:rgba(7,14,32,.98);
  border:1px solid rgba(0,229,255,.1);border-bottom:none;border-radius:22px 22px 0 0;
  padding:0 16px calc(20px + env(safe-area-inset-bottom,0px));
  max-height:52vh;overflow-y:auto;transform:translateY(100%);
  transition:transform .38s cubic-bezier(.34,1.56,.64,1);z-index:460;
  box-shadow:0 -8px 40px rgba(0,0,0,.8)}
#info-panel.visible{transform:translateY(0)}
.panel-handle{width:40px;height:4px;background:rgba(255,255,255,.17);border-radius:2px;
  margin:12px auto 14px}
.panel-title{font-size:20px;font-weight:700;color:#00e5ff;
  display:flex;align-items:center;gap:8px;margin-bottom:6px}
.panel-cat{display:inline-flex;align-items:center;gap:5px;font-size:11px;
  background:rgba(0,229,255,.09);border:1px solid rgba(0,229,255,.22);color:#00e5ff;
  padding:3px 10px;border-radius:20px;margin-bottom:12px}
.panel-desc{font-size:14px;line-height:1.75;color:#b0cce6;margin-bottom:12px}
.panel-facts{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.fact-chip{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);
  border-radius:12px;padding:5px 12px;font-size:12px;color:#7aaabe}
.fact-chip strong{display:block;font-size:13px;color:#e8f4ff}

/* ── RIVER POPUP */
#river-popup{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(8px);
  z-index:700;display:none;align-items:flex-end;justify-content:center}
#river-popup.active{display:flex}
.river-sheet{background:linear-gradient(160deg,#0c1d3b,#071424);
  border:1px solid rgba(0,229,255,.18);border-radius:24px 24px 0 0;
  padding:0 18px calc(28px + env(safe-area-inset-bottom,0px));
  width:100%;max-width:520px;max-height:78vh;overflow-y:auto;
  animation:slideUp .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.rsh-handle{width:40px;height:4px;background:rgba(255,255,255,.17);border-radius:2px;margin:12px auto 16px}
.riv-name{font-size:23px;font-weight:700;color:#00e5ff;display:flex;align-items:center;gap:10px;margin-bottom:4px}
.riv-sub{font-size:12px;color:#4dd0e1;opacity:.8;margin-bottom:18px}
.riv-route{background:rgba(0,229,255,.04);border:1px solid rgba(0,229,255,.09);
  border-radius:16px;padding:14px;margin-bottom:14px}
.riv-step{display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.riv-step:last-child{margin-bottom:0}
.rdot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:14px;flex-shrink:0;margin-top:2px}
.rdot-o{background:rgba(76,175,80,.17);border:2px solid #4caf50;color:#4caf50}
.rdot-d{background:rgba(33,150,243,.17);border:2px solid #2196f3;color:#2196f3}
.rstep-lbl{font-size:11px;color:#7cb9e8;margin-bottom:2px}
.rstep-val{font-size:14px;font-weight:600;color:#e8f4ff}
.rstep-det{font-size:12px;color:#4a8aaa;margin-top:2px}
.riv-connector{width:2px;height:14px;background:rgba(0,229,255,.14);margin:3px 0 3px 14px}
.riv-desc{font-size:13.5px;line-height:1.72;color:#9cbedd;margin-bottom:16px}
.riv-stats{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:18px}
.rstat{flex:1;min-width:85px;background:rgba(0,229,255,.055);
  border:1px solid rgba(0,229,255,.11);border-radius:14px;padding:10px 12px;text-align:center}
.rstat-val{font-size:16px;font-weight:700;color:#00e5ff;display:block}
.rstat-lbl{font-size:11px;color:#5a90b0;margin-top:2px}
.riv-close-btn{width:100%;padding:13px;background:linear-gradient(135deg,#006a4e,#00897b);
  border:none;border-radius:16px;color:#fff;font-family:'Hind Siliguri',sans-serif;
  font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(0,137,123,.38)}

/* ── QUIZ */
#quiz-overlay{position:fixed;inset:0;background:rgba(5,9,21,.98);z-index:900;
  display:none;flex-direction:column;align-items:center;justify-content:center;padding:16px}
#quiz-overlay.active{display:flex}
.quiz-wrap{width:100%;max-width:430px}
.quiz-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.quiz-ttl{font-size:18px;font-weight:700;color:#00e5ff}
.quiz-pbw{height:4px;background:rgba(255,255,255,.1);border-radius:2px;margin-bottom:18px;overflow:hidden}
.quiz-pb{height:100%;background:linear-gradient(90deg,#006a4e,#00e5ff);border-radius:2px;transition:width .4s}
.quiz-q{font-size:17px;font-weight:600;line-height:1.55;color:#e8f4ff;margin-bottom:18px}
.quiz-opts{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.quiz-opt{padding:13px 16px;background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.1);border-radius:14px;color:#e8f4ff;
  font-family:'Hind Siliguri',sans-serif;font-size:14px;cursor:pointer;
  text-align:left;transition:background .18s,border-color .18s,transform .1s}
.quiz-opt:active{transform:scale(.98)}
.quiz-opt.correct{background:rgba(76,175,80,.2)!important;border-color:#4caf50!important;color:#a5d6a7!important}
.quiz-opt.wrong{background:rgba(244,67,54,.2)!important;border-color:#f44336!important;color:#ef9a9a!important}
.quiz-exp{background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.14);border-radius:12px;
  padding:12px 14px;font-size:13px;color:#7cb9e8;margin-bottom:14px;display:none;line-height:1.62}
.quiz-nav{display:flex;gap:10px}
.qbtn{flex:1;padding:13px;border-radius:14px;border:none;font-family:'Hind Siliguri',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;transition:transform .1s}
.qbtn:active{transform:scale(.97)}
.qbtn-p{background:linear-gradient(135deg,#006a4e,#00897b);color:#fff}
.qbtn-s{background:rgba(255,255,255,.08);color:#aaa}
.result-scr{text-align:center;padding:10px 0 4px}
.result-em{font-size:60px;margin-bottom:10px;display:block}
.result-sc{font-size:28px;font-weight:700;color:#00e5ff;margin-bottom:6px}
.result-msg{font-size:15px;color:#7cb9e8;margin-bottom:22px}

/* ── BOTTOM NAV */
#bottom-nav{position:fixed;bottom:0;left:0;right:0;height:62px;
  background:rgba(7,12,24,.97);border-top:1px solid rgba(0,229,255,.08);
  display:flex;z-index:450;backdrop-filter:blur(12px);
  padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;border:none;background:transparent;color:rgba(255,255,255,.38);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;cursor:pointer;font-family:'Hind Siliguri',sans-serif;font-size:10px;
  transition:color .18s;-webkit-tap-highlight-color:transparent}
.nav-btn .ni{font-size:22px}
.nav-btn.active{color:#00e5ff}

/* ── TOAST */
#toast{position:fixed;top:68px;left:50%;transform:translateX(-50%) translateY(-70px);
  background:rgba(0,130,115,.95);color:#fff;padding:9px 20px;border-radius:22px;
  font-size:14px;z-index:600;transition:transform .3s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;pointer-events:none;box-shadow:0 4px 18px rgba(0,0,0,.5)}
#toast.show{transform:translateX(-50%) translateY(0)}

/* ── PIN */
.dynamic-pin{pointer-events:none}
.pin-lbl{fill:#fff;font-family:'Hind Siliguri',sans-serif;font-weight:700;font-size:14px;
  paint-order:stroke;stroke:#000;stroke-width:3px;pointer-events:none}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,229,255,.2);border-radius:2px}
</style>
</head>

// ─── TRANSFORM (GPU-safe translate3d)
function applyTransform(smooth){
  svg.style.transition=smooth?"transform 0.82s cubic-bezier(.34,1.56,.64,1)":"none";
  svg.style.transform=`translate3d(${tx}px,${ty}px,0) scale(${scale})`;
}
function resetView(){
  const W=holder.clientWidth,H=holder.clientHeight;
  scale=Math.min(W/1545,H/2133)*.88;tx=(W-1545*scale)/2;ty=(H-2133*scale)/2;
  applyTransform(true);closeInfoPanel();setTimeout(updateLabels,900);
}
function zoomIn(){zoomAt(holder.clientWidth/2,holder.clientHeight/2,1.25)}
function zoomOut(){zoomAt(holder.clientWidth/2,holder.clientHeight/2,0.8)}
function zoomAt(cx,cy,f){
  const ns=Math.min(Math.max(0.1,scale*f),14),r=ns/scale;
  tx=cx-(cx-tx)*r;ty=cy-(cy-ty)*r;scale=ns;applyTransform(true);setTimeout(updateLabels,900);
}
function flyTo(x,y,zl,off=40){
  const W=holder.clientWidth,H=holder.clientHeight;
  scale=zl;tx=W/2-x*scale;ty=H/2-y*scale-off;applyTransform(true);setTimeout(updateLabels,900);
}
function updateLabels(){
  document.querySelectorAll('.district-label').forEach(l=>l.style.opacity=scale>=1.2?'1':'0');
}

// ─── DRAG/PINCH/WHEEL
holder.addEventListener('mousedown',e=>{dragging=true;didMove=false;sx=e.clientX-tx;sy=e.clientY-ty;svg.style.transition="none"});
window.addEventListener('mousemove',e=>{if(!dragging)return;didMove=true;tx=e.clientX-sx;ty=e.clientY-sy;applyTransform()});
window.addEventListener('mouseup',()=>{dragging=false});
holder.addEventListener('touchstart',e=>{
  svg.style.transition="none";didMove=false;
  if(e.touches.length===1){dragging=true;pinchD=null;sx=e.touches[0].clientX-tx;sy=e.touches[0].clientY-ty;ts0x=e.touches[0].clientX;ts0y=e.touches[0].clientY;}
  else if(e.touches.length===2){dragging=false;pinchD=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
},{passive:false});
window.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(e.touches.length===1&&dragging){
    if(Math.abs(e.touches[0].clientX-ts0x)>4||Math.abs(e.touches[0].clientY-ts0y)>4)didMove=true;
    tx=e.touches[0].clientX-sx;ty=e.touches[0].clientY-sy;applyTransform();
  }else if(e.touches.length===2&&pinchD!==null){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2,my=(e.touches[0].clientY+e.touches[1].clientY)/2;
    const ns=Math.min(Math.max(0.1,scale*d/pinchD),14),r=ns/scale;
    tx=mx-(mx-tx)*r;ty=my-(my-ty)*r;scale=ns;applyTransform();pinchD=d;
  }
},{passive:false});
window.addEventListener('touchend',()=>{dragging=false;pinchD=null;if(!didMove)updateLabels()});
holder.addEventListener('wheel',e=>{
  e.preventDefault();const rect=holder.getBoundingClientRect();
  zoomAt(e.clientX-rect.left,e.clientY-rect.top,e.deltaY<0?1.12:0.89);
},{passive:false});

// ─── CLICK
svg.addEventListener('click',e=>{
  if(didMove)return;
  const div=e.target.closest('.division'),riv=e.target.closest('.river-path');
  if(div)onDistrictClick(div);else if(riv)openRiver(riv.id);else closeInfoPanel();
});
function onDistrictClick(el){
  clearHL();el.classList.add('highlighted');
  const name=el.querySelector('title')?.textContent||el.id;
  const bbox=el.getBBox();const cx=bbox.x+bbox.width/2,cy=bbox.y+bbox.height/2;
  flyTo(cx,cy,Math.min(12,Math.max(1.8,700/Math.max(bbox.width,bbox.height))));
  const D=DINFO[el.id]||{};const api=mapData.find(d=>d.title===name||d.target_id===el.id);
  showPanel({emoji:"📍",title:name,cat:D.div||"জেলা",
    desc:api?.description||`${name} বাংলাদেশের একটি গুরুত্বপূর্ণ প্রশাসনিক জেলা।`,
    facts:[D.area&&{lbl:"আয়তন",val:D.area},D.pop&&{lbl:"জনসংখ্যা",val:D.pop},D.famous&&{lbl:"বিখ্যাত",val:D.famous}].filter(Boolean)});
  toast("📍 "+name);
}

function showPanel({emoji,title,cat,desc,facts=[]}){

    <div class="panel-title">${emoji} ${title}</div>
    ${cat?`<div class="panel-cat">${cat}</div>`:""}

}
function closeInfoPanel(){document.getElementById('info-panel').classList.remove('visible');clearHL();}
function clearHL(){document.querySelectorAll('.division.highlighted').forEach(e=>e.classList.remove('highlighted'));document.querySelectorAll('.dynamic-pin').forEach(p=>p.remove());}
let py0=0;
document.getElementById('info-panel').addEventListener('touchstart',e=>{py0=e.touches[0].clientY;},{passive:true});
document.getElementById('info-panel').addEventListener('touchend',e=>{if(e.changedTouches[0].clientY-py0>55)closeInfoPanel();},{passive:true});

// ─── SEARCH
const inp=document.getElementById('searchInput'),sug=document.getElementById('suggestions');
function handleSearch(){
  const q=inp.value.trim().toLowerCase();if(!q){toast("কিছু লিখুন!");return;}
  sug.style.display="none";
  const rv=Object.entries(RIVERS).find(([,r])=>r.name.toLowerCase().includes(q));
  if(rv){openRiver(rv[0]);return;}
  if(mapData.length){const res=mapData.filter(d=>d.title?.toLowerCase().includes(q)||d.description?.toLowerCase().includes(q)||d.target_id?.toLowerCase().includes(q));if(res.length){showResults(res);return;}}
  for(const el of document.querySelectorAll('.division')){const n=el.querySelector('title')?.textContent||"";if(n.toLowerCase().includes(q)||el.id.toLowerCase().includes(q)){onDistrictClick(el);return;}}
  toast("❌ কিছু পাওয়া যায়নি");
}
inp.addEventListener('input',function(){
  const v=this.value.trim().toLowerCase();sug.innerHTML="";
  if(!v){sug.style.display="none";return;}
  const items=[];
  Object.entries(RIVERS).forEach(([id,r])=>{if(r.name.toLowerCase().includes(v))items.push({ico:"🌊",name:r.name,cat:"নদী",fn:()=>openRiver(id)});});
  if(mapData.length){[...new Map(mapData.filter(d=>d.title?.toLowerCase().includes(v)).map(d=>[d.title,d])).values()].slice(0,5).forEach(d=>items.push({ico:"📌",name:d.title,cat:d.category||"তথ্য",fn:()=>showResults([d])}));}
  document.querySelectorAll('.division').forEach(el=>{const n=el.querySelector('title')?.textContent||"";if(n.toLowerCase().includes(v)&&!items.find(x=>x.name===n))items.push({ico:"📍",name:n,cat:"জেলা",fn:()=>onDistrictClick(el)});});
  if(!items.length){sug.style.display="none";return;}
  items.slice(0,10).forEach(item=>{const d=document.createElement('div');d.className="sugg-item";d.innerHTML=`<span class="sugg-icon">${item.ico}</span><div><div class="sugg-name">${item.name}</div><div class="sugg-cat">${item.cat}</div></div>`;d.onclick=()=>{inp.value=item.name;sug.style.display="none";item.fn();};sug.appendChild(d);});
  sug.style.display="block";
});
document.addEventListener('touchstart',e=>{if(!e.target.closest('#search-bar'))sug.style.display="none";},{passive:true});
document.addEventListener('mousedown',e=>{if(!e.target.closest('#search-bar'))sug.style.display="none";});
inp.addEventListener('keydown',e=>{if(e.key==="Enter")handleSearch();});

function showResults(res){
  clearHL();res.forEach((d,i)=>{const el=document.getElementById(d.target_id);if(el){el.classList.add('highlighted');if(i===0){const b=el.getBBox();flyTo(b.x+b.width/2,b.y+b.height/2,2.5);}}
    const px=parseFloat(d.coordinate_x),py=parseFloat(d.coordinate_y);if(!isNaN(px)&&px>0){addPin(px,py,d.title);if(i===0)flyTo(px,py,3);}});
  if(res.length)showPanel({emoji:"📌",title:res[0].title,cat:res[0].category,desc:res[0].description||"",facts:[]});
}
function addPin(x,y,label){const g=document.createElementNS("http://www.w3.org/2000/svg","g");g.className="dynamic-pin";g.setAttribute("transform",`translate(${x},${y})`);g.innerHTML=`<circle cx="0" cy="0" r="5" fill="none" stroke="#EA4335" stroke-width="2"><animate attributeName="r" from="5" to="28" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" from="0.8" to="0" dur="1.5s" repeatCount="indefinite"/></circle><path d="M0,0C-2,-5-13,-14-13,-26A13,13 0 1,1 13,-26C13,-14 2,-5 0,0Z" fill="#EA4335" stroke="#C62828"/><circle cx="0" cy="-26" r="5" fill="white"/><text x="0" y="-42" class="pin-lbl" text-anchor="middle">${label}</text>`;svg.appendChild(g);}

// ─── RIVER POPUP

    <div class="riv-route">
      <div class="riv-step"><div class="rdot rdot-o">▲</div><div><div class="rstep-lbl">${r.o.lbl}</div><div class="rstep-val">${r.o.val}</div><div class="rstep-det">${r.o.det}</div></div></div>
      <div class="riv-connector"></div>
      <div class="riv-step"><div class="rdot rdot-d">▼</div><div><div class="rstep-lbl">${r.d.lbl}</div><div class="rstep-val">${r.d.val}</div><div class="rstep-det">${r.d.det}</div></div></div>
    </div>
    <p class="riv-desc">${r.desc}</p>
    <div class="riv-stats">
      <div class="rstat"><span class="rstat-val">${r.len}</span><span class="rstat-lbl">দৈর্ঘ্য</span></div>
      <div class="rstat"><span class="rstat-val">${r.basin}</span><span class="rstat-lbl">অববাহিকা</span></div>
      <div class="rstat"><span class="rstat-val">${r.flow}</span><span class="rstat-lbl">প্রবাহ</span></div>

// ─── RIPPLES (estuary — SVG SMIL, compositor thread, no CPU jank)
const MOUTHS=[{x:870,y:1770},{x:950,y:1840},{x:790,y:1810},{x:1060,y:1830},{x:1140,y:1875},{x:835,y:1885}];
function spawnRipple(x,y){
  const sea=document.getElementById('sea-layer');if(!sea)return;
  const c=document.createElementNS("http://www.w3.org/2000/svg","circle");
  c.setAttribute("cx",x);c.setAttribute("cy",y);c.setAttribute("r","4");c.setAttribute("class","river-ripple");
  c.innerHTML=`<animate attributeName="r" from="4" to="70" dur="3s" fill="freeze"/><animate attributeName="opacity" from="0.8" to="0" dur="3s" fill="freeze"/><animate attributeName="stroke-width" from="2.5" to="0.5" dur="3s" fill="freeze"/>`;
  sea.appendChild(c);setTimeout(()=>c.remove(),3100);
}
function runRipples(){MOUTHS.forEach(p=>{setTimeout(()=>spawnRipple(p.x+Math.random()*24-12,p.y+Math.random()*24-12),Math.random()*2200);});}
setInterval(runRipples,3600);runRipples();

// ─── LABELS
function buildLabels(){
  const layer=document.getElementById('labels-layer');layer.innerHTML="";
  document.querySelectorAll('.division').forEach(el=>{
    const t=el.querySelector('title')?.textContent;if(!t)return;
    const d=mapData.find(m=>m.title===t);let x,y;
    if(d?.coordinate_x){x=+d.coordinate_x;y=+d.coordinate_y;}else{const b=el.getBBox();x=b.x+b.width/2;y=b.y+b.height/2;}
    const txt=document.createElementNS("http://www.w3.org/2000/svg","text");
    txt.setAttribute("x",x);txt.setAttribute("y",y);txt.setAttribute("class","district-label");
    txt.setAttribute("text-anchor","middle");txt.setAttribute("dominant-baseline","middle");txt.textContent=t;
    layer.appendChild(txt);
  });
}

let qs={i:0,sc:0};
function renderQuiz(){
  const card=document.getElementById('quiz-card');
  if(qs.i>=QUIZ.length){const p=Math.round(qs.sc/QUIZ.length*100);card.innerHTML=`<div class="result-scr"><span class="result-em">${p>=80?"🏆":p>=50?"👍":"💪"}</span><div class="result-sc">${qs.sc}/${QUIZ.length}</div><div class="result-msg">${p>=80?"অসাধারণ! বিশেষজ্ঞ!":p>=50?"ভালো করেছেন!":"আরো পড়ুন।"}</div><div class="quiz-nav"><button class="qbtn qbtn-p" onclick="qs={i:0,sc:0};renderQuiz()">🔄 আবার</button><button class="qbtn qbtn-s" onclick="setTab('map')">✕</button></div></div>`;return;}
  const q=QUIZ[qs.i];card.innerHTML=`
    <div class="quiz-hdr"><span class="quiz-ttl">🧠 GK কুইজ</span><span style="font-size:12px;color:#7cb9e8">${qs.i+1}/${QUIZ.length} • ${qs.sc}</span></div>
    <div class="quiz-pbw"><div class="quiz-pb" style="width:${qs.i/QUIZ.length*100}%"></div></div>
    <div class="quiz-q">${q.q}</div>

    <div class="quiz-exp" id="qexp">💡 ${q.e}</div>
    <div id="qnav" style="display:none" class="quiz-nav"><button class="qbtn qbtn-p" onclick="qs.i++;renderQuiz()">পরবর্তী ➡</button></div>`;
}
function ansQ(i){const q=QUIZ[qs.i];document.querySelectorAll('.quiz-opt').forEach(o=>o.disabled=true);document.querySelectorAll('.quiz-opt')[q.a].classList.add('correct');if(i!==q.a)document.querySelectorAll('.quiz-opt')[i].classList.add('wrong');else qs.sc++;document.getElementById('qexp').style.display="block";document.getElementById('qnav').style.display="flex";}

// ─── NAV
function setTab(tab){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active');
  const qo=document.getElementById('quiz-overlay');qo.style.display=tab==='quiz'?'flex':'none';qo.classList.toggle('active',tab==='quiz');
  if(tab==='quiz'){renderQuiz();return;}
  if(tab==='rivers'){showRiversList();return;}
  if(tab==='map')closeInfoPanel();
}
function showRiversList(){
  showPanel({emoji:"🌊",title:"বাংলাদেশের নদী",cat:"",desc:"",facts:[]});
  document.getElementById('panel-content').innerHTML+=`<div style="margin-top:10px;display:flex;flex-direction:column;gap:10px">${Object.entries(RIVERS).map(([id,r])=>`<div onclick="openRiver('${id}')" style="background:rgba(0,229,255,.05);border:1px solid rgba(0,229,255,.1);border-radius:14px;padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:12px"><span style="font-size:22px">🌊</span><div style="flex:1"><div style="font-size:14px;font-weight:700;color:#00e5ff">${r.name}</div><div style="font-size:12px;color:#4a8aaa">${r.sub}</div></div><span style="color:rgba(0,229,255,.4);font-size:18px">›</span></div>`).join("")}</div>`;
}

// ─── TOAST
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500);}

// ─── LOAD
async function loadData(){try{const res=await fetch(API_URL);mapData=await res.json();buildLabels();mapData.forEach(item=>{if(item.meeting_point){const c=item.meeting_point.split(',').map(n=>+n.trim());if(c.length===2)MOUTHS.push({x:c[0],y:c[1]});}});}catch{buildLabels();}}

window.addEventListener('load',()=>{
  resetView();loadData();
  setTimeout(()=>{const ld=document.getElementById('loader');ld.style.opacity='0';setTimeout(()=>ld.style.display='none',520);toast("🗺️ ম্যাপে ক্লিক বা সার্চ করুন");},1300);
});
window.handleSearch=handleSearch;window.openRiver=openRiver;window.closeRiver=closeRiver;
window.zoomIn=zoomIn;window.zoomOut=zoomOut;window.resetView=resetView;
window.setTab=setTab;window.ansQ=ansQ;
</script>
